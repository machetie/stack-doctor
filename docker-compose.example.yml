services:
  stack-doctor:
    image: ghcr.io/neoo-blue/stack-doctor:latest
    # or build locally:  build: .
    container_name: stack-doctor
    restart: unless-stopped
    environment:
      # ---------- mode ----------
      DOCTOR_MODE: cron            # cron | event
      DOCTOR_INTERVAL: "900"       # cron: seconds between sweeps
      DOCTOR_DRY_RUN: "false"      # true = log only, change nothing
      DOCTOR_LOG_LEVEL: INFO
      DOCTOR_LOG_FILE: /data/doctor.log   # rotating file log (also logs to stdout)

      # ---------- which checks to run ----------
      ENABLE_QUEUE: "true"           # *arr stuck-queue cleaner
      ENABLE_PROVIDERS: "true"       # auto-Test failed indexers/download clients (sonarr/radarr/prowlarr)
      ENABLE_DECYPHARR: "true"       # decypharr mount-hang watchdog
      ENABLE_PLEX: "true"            # Plex reachability
      ENABLE_RESOURCES: "true"       # host load / mem / swap
      ENABLE_JANITOR: "false"        # usenet dead-file quarantine (needs a decypharr log file)
      ENABLE_BAZARR: "false"         # Bazarr reachability (set BAZARR_URL/BAZARR_APIKEY)
      ENABLE_WARMER: "false"         # precache the head of likely-next media (needs PLEX_URL/PLEX_TOKEN)

      # ---------- queue check ----------
      DOCTOR_MIN_STRIKES: "2"      # consecutive sweeps stuck before acting (ignores transient blips)
      DOCTOR_MAX_ACTIONS: "20"     # max removals per sweep
      DOCTOR_BLOCKLIST: "true"     # blocklist removed grabs so a different release is fetched
      # churn brake: stop a title that keeps grabbing dead releases (never imports, burns cycles)
      DOCTOR_CHURN_LIMIT: "0"      # after N dead grabs of the same episode/movie, brake (0 = off)
      DOCTOR_CHURN_ACTION: "report"   # report | park (un-monitor) | backoff (un-monitor, retry after cooldown)
      DOCTOR_CHURN_COOLDOWN: "86400"  # backoff: seconds parked before a fresh retry
      # DOCTOR_LOAD_MAX: "60"      # skip queue sweep if host 1-min load above this
      # DOCTOR_CONDITIONS: "downloadClientUnavailable,importBlocked,importFailed,importPending_warning,failedPending,stalled"

      INSTANCE_1_NAME: sonarr
      INSTANCE_1_TYPE: sonarr
      INSTANCE_1_URL: http://sonarr:8989
      INSTANCE_1_APIKEY: ${SONARR_API_KEY}
      INSTANCE_2_NAME: radarr
      INSTANCE_2_TYPE: radarr
      INSTANCE_2_URL: http://radarr:7878
      INSTANCE_2_APIKEY: ${RADARR_API_KEY}
      INSTANCE_3_NAME: sonarr4k
      INSTANCE_3_TYPE: sonarr
      INSTANCE_3_URL: http://sonarr4k:8989
      INSTANCE_3_APIKEY: ${SONARR4K_API_KEY}
      INSTANCE_4_NAME: radarr4k
      INSTANCE_4_TYPE: radarr
      INSTANCE_4_URL: http://radarr4k:7878
      INSTANCE_4_APIKEY: ${RADARR4K_API_KEY}
      INSTANCE_5_NAME: prowlarr        # prowlarr is for the providers check (no download queue)
      INSTANCE_5_TYPE: prowlarr
      INSTANCE_5_URL: http://prowlarr:9696
      INSTANCE_5_APIKEY: ${PROWLARR_API_KEY}

      # ---------- bazarr (optional) ----------
      BAZARR_URL: http://bazarr:6767
      BAZARR_APIKEY: ${BAZARR_API_KEY}

      # ---------- decypharr (mount-hang watchdog) ----------
      DECYPHARR_URL: http://192.168.1.10:8282        # API reachability (optional)
      DECYPHARR_MOUNT_TEST: /mnt/library/movies      # a dir on the FUSE mount to read-test
      DECYPHARR_READ_TIMEOUT: "25"
      # if a read hangs, run this to recover (decypharr is often a HOST service, so use ssh/docker):
      # DECYPHARR_RESTART_CMD: "ssh root@192.168.1.10 systemctl restart decypharr"
      # DECYPHARR_RESTART_CMD: "docker restart decypharr"

      # ---------- plex ----------
      PLEX_URL: http://192.168.1.20:32400
      PLEX_TOKEN: ${PLEX_TOKEN}
      PLEX_SCAN_ON_CHECK: "false"    # also trigger a library refresh when Plex is up

      # ---------- warmer (instant playback start; reuses PLEX_URL/PLEX_TOKEN) ----------
      WARMER_PRECACHE_MB: "64"       # how much of each file's head to pull into cache
      WARMER_TAIL_MB: "8"            # also pull the tail (mkv cues / Plex end-probe); 0 = off
      WARMER_SOURCES: "ondeck,next"  # ondeck = Continue Watching, next = next episode of what's playing, recent = newly added
      WARMER_INTERVAL: "120"         # seconds between session polls (next-episode prefetch)
      WARMER_ONDECK_EVERY: "600"     # seconds between On Deck / recent warms
      WARMER_MAX_PER_CYCLE: "12"     # cap warms per cycle (rate-limit the usenet fetch)
      WARMER_COOLDOWN: "3600"        # don't re-warm the same file within this many seconds
      WARMER_LOAD_MAX: "30"          # skip a warm cycle if host 1-min load is above this (protect live playback)
      # WARMER_PATH_MAP: "/data/media:/mnt/library"   # if Plex's file path differs from this container's
      # detail-page warming: warm the exact title a viewer opens (bind-mount Plex's log read-only, then:)
      # WARMER_PLEXLOG_FILE: "/plexlog/Plex Media Server.log"

      # ---------- resources ----------
      RES_LOAD_WARN: "40"
      RES_SWAP_WARN_MB: "7000"
      RES_MEM_MIN_MB: "800"
      RES_DROP_CACHES: "false"       # echo 1 > drop_caches under memory pressure (needs the mount below + privilege)

      # ---------- janitor (optional) ----------
      JANITOR_LIBRARY_PATHS: /mnt/library/tv,/mnt/library/movies
      JANITOR_DECYPHARR_LOG: /logs/decypharr.log     # mount decypharr's error log here
    volumes:
      - ./data:/data                                 # state + file log + quarantine manifests
      - /mnt/library:/mnt/library                    # for mount read-test + janitor (read/write for janitor)
      # - /proc/loadavg:/proc/loadavg:ro             # host load for resources check
      # - /proc/meminfo:/proc/meminfo:ro             # host memory for resources check
      # - /var/log/decypharr.log:/logs/decypharr.log:ro   # for the janitor
    # ports:
    #   - "8088:8088"            # only for event mode (Sonarr/Radarr webhook target)
