name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suite
        run: python3 -m unittest discover -s tests -v

  # ── 2. Syntax / lint gate ────────────────────────────────────────────────
  lint:
    name: Syntax + lint (compileall + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check (syntax errors)
        run: python3 -m compileall -q doctor/

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Ruff — undefined names and unused imports (F-only)
        run: ruff check doctor/ tests/ --output-format=github

  # ── 3. Startup + /healthz smoke ─────────────────────────────────────────
  smoke:
    name: Startup smoke + /healthz
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start daemon (no checks, UI enabled)
        run: |
          ENABLE_QUEUE=false \
          ENABLE_MULTIPACK=false \
          ENABLE_UI=true \
          DOCTOR_UI_PORT=12345 \
          DOCTOR_STATE_FILE=/tmp/doctor_state.json \
          python3 -m doctor &
          echo $! > /tmp/doctor.pid

      - name: Wait for HTTP server to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:12345/healthz; then
              echo " — /healthz OK"
              exit 0
            fi
            sleep 0.5
          done
          echo "ERROR: /healthz did not respond within 5s"
          exit 1

      - name: Tear down daemon
        if: always()
        run: kill $(cat /tmp/doctor.pid) 2>/dev/null || true

  # ── 4. Docker publish (main + tags only, gated on test + lint + smoke) ──
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test, lint, smoke]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
